<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinel — Demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="grid-bg"></div>
    <div class="scanline"></div>

    <div id="app">
        <header>
            <div class="brand">
                <div class="brand-mark">
                    <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2 4 5v6c0 5 3.4 9.4 8 11 4.6-1.6 8-6 8-11V5l-8-3z"/>
                        <path d="M9 12l2 2 4-4"/>
                    </svg>
                </div>
                <div class="brand-text">
                    <h1>SENTINEL</h1>
                    <p class="tagline">Soberanía Sobre tu Seguridad</p>
                </div>
            </div>
            <div class="head-right">
                <button class="sound-toggle" id="sound-toggle" data-testid="sound-toggle-btn" aria-pressed="true" title="Activar/silenciar sonido">
                    <svg class="ic ic-on" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
                        <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
                    </svg>
                    <svg class="ic ic-off" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                        <line x1="23" y1="9" x2="17" y2="15"/>
                        <line x1="17" y1="9" x2="23" y2="15"/>
                    </svg>
                    <span class="st-label">SFX</span>
                </button>
                <div class="sys-status" id="sys-status">
                    <span class="pulse-dot"></span>
                    <span class="sys-label">SYSTEM ONLINE</span>
                </div>
            </div>
        </header>

        <main>
            <section id="status-panel" class="panel">
                <div class="panel-header">
                    <span class="panel-label">// MODO OPERATIVO</span>
                    <span class="uptime" id="uptime">00:00:00</span>
                </div>

                <div class="mode-wrap">
                    <div class="mode-ring"></div>
                    <div id="mode-display" data-mode="ASSIST">ASSIST</div>
                    <div class="mode-desc" id="mode-desc">Sistema en asistencia activa</div>
                    <div class="auto-return" id="auto-return" data-testid="auto-return" hidden>
                        <span class="ar-label">// Auto-retorno a ASSIST en</span>
                        <span class="ar-count" id="ar-count">8s</span>
                    </div>
                </div>

                <div class="log-header">
                    <span class="panel-label">// REGISTRO DE EVENTOS</span>
                    <button class="clear-btn" id="clear-btn" data-testid="clear-log-btn">LIMPIAR</button>
                </div>
                <div id="event-log" class="event-log">
                    <div class="log-empty">Esperando eventos...</div>
                </div>
            </section>

            <section id="metrics" class="metrics panel" data-testid="metrics-panel">
                <div class="panel-header">
                    <span class="panel-label">// MÉTRICAS POR MODO</span>
                    <div class="metrics-actions">
                        <span class="metrics-total" id="metrics-total" data-testid="metrics-total">TOTAL 0</span>
                        <button class="report-btn" id="export-json" data-testid="export-json-btn" title="Descargar reporte JSON">
                            <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                                <polyline points="7 10 12 15 17 10"/>
                                <line x1="12" y1="15" x2="12" y2="3"/>
                            </svg>
                            <span>JSON</span>
                        </button>
                        <button class="report-btn report-btn--primary" id="export-png" data-testid="export-png-btn" title="Descargar reporte PNG">
                            <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                                <circle cx="8.5" cy="8.5" r="1.5"/>
                                <polyline points="21 15 16 10 5 21"/>
                            </svg>
                            <span>PNG</span>
                        </button>
                    </div>
                </div>
                <div class="metrics-grid" id="metrics-grid"></div>
            </section>

            <section id="demo-controls" class="controls">
                <span class="panel-label controls-label">// SIMULACIÓN DE EVENTOS</span>
                <div class="button-grid">
                    <button data-event="fall" data-testid="event-fall-btn">
                        <span class="btn-icon">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M12 2v6"/><path d="M6 12l6 6 6-6"/><path d="M4 20h16"/>
                            </svg>
                        </span>
                        <span class="btn-text">Caída detectada</span>
                    </button>
                    <button data-event="motion" data-testid="event-motion-btn">
                        <span class="btn-icon">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="3"/>
                                <path d="M3 12h3M18 12h3M12 3v3M12 18v3"/>
                            </svg>
                        </span>
                        <span class="btn-text">Movimiento sospechoso</span>
                    </button>
                    <button data-event="emergency" data-testid="event-emergency-btn">
                        <span class="btn-icon">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
                                <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
                            </svg>
                        </span>
                        <span class="btn-text">Emergencia</span>
                    </button>
                    <button data-event="observe" data-testid="event-observe-btn">
                        <span class="btn-icon">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </span>
                        <span class="btn-text">Observación pasiva</span>
                    </button>
                </div>
            </section>

            <footer class="foot">
                <span>SENTINEL_DEMO_v0.1</span>
                <span class="foot-sep">·</span>
                <span id="event-count">0 eventos</span>
                <span class="foot-sep">·</span>
                <span>local session</span>
            </footer>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
