[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Serve sentinel-demo static files directly (no SPA fallback)
[[redirects]]
  from = "/sentinel-demo/*"
  to = "/sentinel-demo/:splat"
  status = 200
  force = false

# SPA fallback: serve index.html for client-side routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
